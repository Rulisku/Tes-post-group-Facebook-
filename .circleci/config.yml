version: 2.1

# 1. Seluruh Parameter yang Dikirim oleh Node HTTP Request n8n
parameters:
  video_url:
    type: string
    default: ""
  timestamps:
    type: string
    default: ""
  audio_url:
    type: string
    default: ""
  audio_timestamps:
    type: string
    default: ""
  videoTitle:
    type: string
    default: ""
  videoDescription:
    type: string
    default: ""
  tags:
    type: string
    default: ""
  channelName:
    type: string
    default: ""
  location:
    type: string
    default: ""
  aiContent:
    type: string
    default: ""
  ageRestriction:
    type: string
    default: ""
  audience:
    type: string
    default: ""
  publishDate:
    type: string
    default: ""
  videoTime:
    type: string
    default: ""

jobs:
  proses:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      
      - run:
          name: Setup & Download
          command: |
            sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg megatools gpac bc file
            
            # Upgrade gdown ke versi terbaru agar kompatibel dengan sistem Docker
            pip install --upgrade gdown --no-deps -q
            
            mkdir -p downloads ready
            sudo chmod -R 777 downloads ready

            # Gabungkan input url video dan audio menjadi satu baris array untuk diunduh
            V_INPUT=$(echo "<< pipeline.parameters.video_url >>" | sed "s/['\"]//g")
            A_INPUT=$(echo "<< pipeline.parameters.audio_url >>" | sed "s/['\"]//g")
            
            # Satukan dengan pemisah koma, lalu ubah jadi spasi untuk perulangan Bash
            URLS=$(echo "$V_INPUT,$A_INPUT" | tr ',' ' ')
            arr=($URLS)
            
            for (( i=0; i<${#arr[@]}; i++ )); do
              url=${arr[$i]}
              [ -z "$url" ] && continue
              
              output="downloads/raw_$i"
              if [[ "$url" == *"mega.nz"* ]]; then
                megadl "$url" --path "$output"
              else
                # Menggunakan flag --remaining-ok agar gdown di Docker stabil menembak Google Drive
                gdown "$url" -O "$output" --quiet --remaining-ok || true
              fi
              
              # Cek apakah file benar-benar sukses terunduh sebelum mengubah ekstensi
              if [ -f "$output" ] && [ -s "$output" ]; then
                ext=$(file --mime-type -b "$output" | cut -d/ -f2 | sed 's/jpeg/jpg/')
                mv "$output" "$output.$ext"
              else
                echo "Peringatan: File index-$i Gagal diunduh atau kosong!"
              fi
            done
            
            sudo chmod -R 777 downloads ready

      - run:
          name: Sync & Encode (FFmpeg)
          command: |
            # SAKELAR PINTAR: Ditambahkan 'exit 0' agar terminal langsung mati seketika dan menghentikan pembacaan ke bawah
            if [ -z "<< pipeline.parameters.video_url >>" ]; then
               echo "Sistem dipicu oleh Git Commit/Push otomatis. Link video kosong."
               echo "Menghentikan build dengan sukses. Menunggu dispatch asli dari n8n..."
               circleci-agent step halt
               exit 0
            fi

            # Proteksi: Cek apakah ada file di folder downloads sebelum menjalankan perintah ls
            if [ -z "$(ls -A downloads)" ]; then
               echo "Error fatal: Folder downloads kosong! Periksa kembali kevalidan link URL Anda."
               exit 1
            fi

            files=($(ls downloads/raw_*.* | sort -V))
            num_files=${#files[@]}
            i=0
            FF_LIGHT="-c:v libx264 -preset ultrafast -tune fastdecode -crf 26 -pix_fmt yuv420p -c:a aac -g 30 -r 30"

            while [ $i -lt $num_files ]; do
              f="${files[$i]}"
              next_idx=$((i+1))
              next_f=""
              [ $next_idx -lt $num_files ] && next_f="${files[$next_idx]}"
              
              is_img=0; is_vid=0; is_aud=0; is_next_aud=0
              mime=$(file --mime-type -b "$f")
              [[ "$mime" == image/* ]] && is_img=1
              [[ "$mime" == video/* ]] && is_vid=1
              [[ "$mime" == audio/* ]] && is_aud=1

              if [ -n "$next_f" ]; then
                next_mime=$(file --mime-type -b "$next_f")
                [[ "$next_mime" == audio/* ]] && is_next_aud=1
              fi

              if [ $is_img -eq 1 ] && [ $is_next_aud -eq 1 ]; then
                ffmpeg -y -loop 1 -i "$f" -i "$next_f" -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" $FF_LIGHT -shortest "ready/video_$i.mp4"
                i=$((i+2))
              elif [ $is_vid -eq 1 ] && [ $is_next_aud -eq 1 ]; then
                ffmpeg -y -i "$f" -i "$next_f" -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" $FF_LIGHT -map 0:v:0 -map 1:a:0 -shortest "ready/video_$i.mp4"
                i=$((i+2))
              elif [ $is_aud -eq 1 ]; then
                ffmpeg -y -f lavfi -i color=c=black:s=1280x720:d=5 -i "$f" $FF_LIGHT -shortest "ready/video_$i.mp4"
                i=$((i+1))
              else
                ffmpeg -y -i "$f" -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" $FF_LIGHT -ar 44100 "ready/video_$i.mp4"
                i=$((i+1))
              fi
            done

      - run:
          name: Merge Final (MP4Box)
          command: |
            if [ -z "$(ls -A ready)" ]; then
               echo "Error: Tidak ada berkas video siap gabung di folder ready."
               exit 1
            fi
            files=($(ls ready/video_*.mp4 | sort -V))
            cmd="MP4Box"
            for f in "${files[@]}"; do
              cmd="$cmd -cat \"$f\""
            done
            cmd="$cmd -new output.mp4"
            eval $cmd

      - run:
          name: Posting ke YouTube Otomatis
          command: |
            # Memanggil skrip python upload dengan seluruh parameter metadata kiriman n8n
            python upload.py \
              --video "output.mp4" \
              --title "<< pipeline.parameters.videoTitle >>" \
              --desc "<< pipeline.parameters.videoDescription >>" \
              --tags "<< pipeline.parameters.tags >>" \
              --channel "<< pipeline.parameters.channelName >>" \
              --location "<< pipeline.parameters.location >>" \
              --ai "<< pipeline.parameters.aiContent >>" \
              --restriction "<< pipeline.parameters.ageRestriction >>" \
              --audience "<< pipeline.parameters.audience >>" \
              --date "<< pipeline.parameters.publishDate >>" \
              --time "<< pipeline.parameters.videoTime >>" \
              --timestamps "<< pipeline.parameters.timestamps >>" \
              --audio_timestamps "<< pipeline.parameters.audio_timestamps >>"

      - store_artifacts:
          path: output.mp4
          destination: final-video

# 3. Alur Kerja Utama yang Diletakkan di Bagian Paling Bawah
workflows:
  ffmpeg_workflow:
    jobs:
      - proses:
          filters:
            branches:
              only:
                - main
