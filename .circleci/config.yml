version: 2.1

# 1. Seluruh Parameter yang Dikirim oleh Node HTTP Request n8n
parameters:
  video_url:
    type: string
    default: ""
  timestamps:
    type: string
    default: ""
  audio_url:
    type: string
    default: ""
  audio_timestamps:
    type: string
    default: ""
  videoTitle:
    type: string
    default: ""
  videoDescription:
    type: string
    default: ""
  tags:
    type: string
    default: ""
  channelName:
    type: string
    default: ""
  location:
    type: string
    default: ""
  aiContent:
    type: string
    default: ""
  ageRestriction:
    type: string
    default: ""
  audience:
    type: string
    default: ""
  publishDate:
    type: string
    default: ""
  videoTime:
    type: string
    default: ""

jobs:
  proses:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Setup & Download
          command: |
            sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg megatools gpac bc file
            pip install -q gdown
            mkdir -p downloads ready
            sudo chmod -R 777 downloads ready

            download_file() {
              local url="$1"
              local output="$2"
              echo "Downloading: $url"
              if [[ "$url" == *"mega.nz"* ]]; then
                  megadl "$url" --path downloads/
                  file=$(find downloads -maxdepth 1 -type f | head -n1)
                  [ -z "$file" ] && { echo "Mega download gagal"; exit 1; }
                  mv "$file" "$output"
              elif [[ "$url" == *"drive.google.com"* ]]; then
                  FILE_ID=$(echo "$url" | sed -n 's#.*\/d\/\([^/]*\)\/.*#\1#p')
                  if [ -z "$FILE_ID" ]; then
                      FILE_ID=$(echo "$url" | sed -n 's#.*id=\([^&]*\).*#\1#p')
                  fi
                  [ -z "$FILE_ID" ] && { echo "Tidak bisa membaca Google Drive File ID"; exit 1; }
                  gdown "https://drive.google.com/uc?id=$FILE_ID" -O "$output"
              else
                  curl -L "$url" -o "$output"
              fi
              if [ ! -s "$output" ]; then
                  echo "Download gagal: $url"
                  exit 1
              fi
            }

            V_INPUT=$(echo "<< pipeline.parameters.video_url >>" | sed "s/['\"]//g")
            A_INPUT=$(echo "<< pipeline.parameters.audio_url >>" | sed "s/['\"]//g")
            URLS=$(echo "$V_INPUT,$A_INPUT" | tr ',' ' ')
            arr=($URLS)

            for (( i=0; i<${#arr[@]}; i++ ))
            do
                url="${arr[$i]}"
                [ -z "$url" ] && continue
                output="downloads/raw_$i"
                download_file "$url" "$output"
                mime=$(file --mime-type -b "$output")
                case "$mime" in
                    image/jpeg) ext=jpg ;;
                    image/png) ext=png ;;
                    image/webp) ext=webp ;;
                    video/mp4) ext=mp4 ;;
                    video/x-matroska) ext=mkv ;;
                    video/webm) ext=webm ;;
                    audio/mpeg) ext=mp3 ;;
                    audio/wav) ext=wav ;;
                    audio/x-wav) ext=wav ;;
                    audio/mp4) ext=m4a ;;
                    audio/aac) ext=aac ;;
                    *) ext=bin ;;
                esac
                mv "$output" "$output.$ext"
            done

      - run:
          name: Cut Video By Timestamp
          command: |
            if [ -z "<< pipeline.parameters.video_url >>" ]; then
               echo "Sistem dipicu oleh Git Commit/Push otomatis. Menghentikan build."
               circleci-agent step halt
               exit 0
            fi

            mkdir -p cuts/video
            VIDEO_TS="<< pipeline.parameters.timestamps >>"
            IFS=',' read -ra PARTS \<<< "$VIDEO_TS"

            for ((i=0;i<${#PARTS[@]};i++))
            do
              START=$(echo "${PARTS[$i]}" | cut -d- -f1)
              END=$(echo "${PARTS[$i]}" | cut -d- -f2)
              VIDEO_FILE=$(find downloads -maxdepth 1 -name "raw_0.*" | head -n1)
              ffmpeg -y -ss "$START" -to "$END" -i "$VIDEO_FILE" -c:v libx264 -c:a aac cuts/video/video_$i.mp4
            done

      - run:
          name: Cut Audio By Timestamp
          command: |
            mkdir -p cuts/audio
            AUDIO_TS="<< pipeline.parameters.audio_timestamps >>"
            AUDIO_FILE=$(find downloads -maxdepth 1 -name "raw_1.*" | head -n1)
            IFS=',' read -ra PARTS \<<< "$AUDIO_TS"

            for ((i=0;i<${#PARTS[@]};i++))
            do
              START=$(echo "${PARTS[$i]}" | cut -d- -f1)
              END=$(echo "${PARTS[$i]}" | cut -d- -f2)
              ffmpeg -y -i "$AUDIO_FILE" -ss "$START" -to "$END" -c:a aac cuts/audio/audio_$i.m4a
              
              if [ ! -s cuts/audio/audio_$i.m4a ]; then
                echo "Audio segment $i gagal dibuat"
                exit 1
              fi
            done

      - run:
          name: Sync & Encode (FFmpeg)
          command: |
            if [ -z "$(ls -A cuts/video 2>/dev/null)" ]; then
               echo "Error: Folder cuts/video kosong!"
               exit 1
            fi
            COUNT=$(ls cuts/video/video_*.mp4 | wc -l)
            for ((i=0;i<COUNT;i++))
            do
              mkdir -p ready
              ffmpeg -y -i cuts/video/video_$i.mp4 -i cuts/audio/audio_$i.m4a -map 0:v -map 1:a -shortest -c:v libx264 -c:a aac ready/video_$i.mp4
            done

      - run:
          name: "Merge Final (MP4Box)"
          command: |
            if [ -z "$(ls -A ready)" ]; then
               echo "Error: Tidak ada berkas video siap gabung."
               exit 1
            fi
            files=($(ls ready/video_*.mp4 | sort -V))
            cmd="MP4Box"
            for f in "${files[@]}"; do
              cmd="$cmd -cat \"$f\""
            done
            cmd="$cmd -new output.mp4"
            eval $cmd

      - run:
          name: Posting ke YouTube Otomatis
          command: |
            python upload.py \
              --video "output.mp4" \
              --title "<< pipeline.parameters.videoTitle >>" \
              --desc "<< pipeline.parameters.videoDescription >>" \
              --tags "<< pipeline.parameters.tags >>" \
              --channel "<< pipeline.parameters.channelName >>" \
              --location "<< pipeline.parameters.location >>" \
              --ai "<< pipeline.parameters.aiContent >>" \
              --restriction "<< pipeline.parameters.ageRestriction >>" \
              --audience "<< pipeline.parameters.audience >>" \
              --date "<< pipeline.parameters.publishDate >>" \
              --time "<< pipeline.parameters.videoTime >>" \
              --timestamps "<< pipeline.parameters.timestamps >>" \
              --audio_timestamps "<< pipeline.parameters.audio_timestamps >>"

      - store_artifacts:
          path: output.mp4
          destination: final-video

workflows:
  ffmpeg_workflow:
    jobs:
      - proses:
          filters:
            branches:
              only:
                - main
