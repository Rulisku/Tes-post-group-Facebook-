name: Render Video Engine
on:
  repository_dispatch:
    types: [render-video]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download & Render
        env:
          VIDEO_URL: ${{ github.event.client_payload.video_url }}
        run: |
          # Download file dari GoFile (Perlu sedikit trik untuk ambil direct link)
          wget -O input.mp4 $VIDEO_URL
          
          # Render Video (Gunakan command FFmpeg Anda)
          ffmpeg -i input.mp4 -c:v libx264 -preset ultrafast output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: hasil-render
          path: output.mp4
