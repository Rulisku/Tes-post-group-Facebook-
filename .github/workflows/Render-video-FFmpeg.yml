name: Render Video Engine

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'URL Visual (Pisahkan dengan KOMA ,)'
        required: true
      audio_urls:
        description: 'URL Audio (Pisahkan dengan KOMA ,)'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render Video
        run: |
          # Ubah KOMA jadi spasi
          v_list=$(echo "${{ github.event.inputs.video_urls }}" | tr ',' ' ')
          a_list=$(echo "${{ github.event.inputs.audio_urls }}" | tr ',' ' ')
          
          v_links=($v_list)
          a_links=($a_list)
          
          # Loop untuk membuat potongan video per pasangan
          for i in "${!v_links[@]}"; do
            wget -q --user-agent="Mozilla/5.0" -O "v_$i.mp4" "${v_links[$i]}"
            wget -q --user-agent="Mozilla/5.0" -O "a_$i.mp3" "${a_links[$i]}"
            
            # Gabungkan pasangan v_i dan a_i agar sinkron
            ffmpeg -y -i "v_$i.mp4" -i "a_$i.mp3" -c:v libx264 -c:a aac -pix_fmt yuv420p -shortest "part_$i.mp4"
            echo "file 'part_$i.mp4'" >> list.txt
          done

          # Gabungkan semua potongan menjadi satu file output
          ffmpeg -y -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-hasil
          path: output.mp4
