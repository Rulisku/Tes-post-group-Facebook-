name: Render Video Engine

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: 'URL Visual (Pisahkan dengan KOMA ,)'
        required: true
      audio_urls:
        description: 'URL Audio (Pisahkan dengan KOMA ,)'
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render Video
        run: |
          # Ubah KOMA jadi spasi untuk pengolahan array
          v_list=$(echo "${{ github.event.inputs.video_urls }}" | tr ',' ' ')
          a_list=$(echo "${{ github.event.inputs.audio_urls }}" | tr ',' ' ')
          
          v_links=($v_list)
          a_links=($a_list)
          
          # Hapus list.txt jika sudah ada dari percobaan sebelumnya
          rm -f list.txt
          
          for i in "${!v_links[@]}"; do
            # Download file
            wget -q --user-agent="Mozilla/5.0" -O "input_v_$i" "${v_links[$i]}"
            wget -q --user-agent="Mozilla/5.0" -O "input_a_$i.mp3" "${a_links[$i]}"
            
            # Deteksi tipe file visual (Gambar atau Video)
            if [[ $(file --mime-type -b "input_v_$i") == image/* ]]; then
              # Jika GAMBAR: Loop gambar, potong mengikuti durasi audio (-shortest)
              ffmpeg -y -loop 1 -i "input_v_$i" -i "input_a_$i.mp3" -c:v libx264 -tune stillimage -c:a aac -pix_fmt yuv420p -shortest "part_$i.mp4"
            else
              # Jika VIDEO: Gabungkan, potong mengikuti durasi terpendek (-shortest)
              ffmpeg -y -i "input_v_$i" -i "input_a_$i.mp3" -c:v libx264 -c:a aac -pix_fmt yuv420p -shortest "part_$i.mp4"
            fi
            
            # Tambahkan ke daftar concat
            echo "file 'part_$i.mp4'" >> list.txt
          done

          # Gabungkan semua potongan menjadi satu file output
          # Menggunakan -c copy agar proses penggabungan akhir sangat cepat
          ffmpeg -y -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-hasil
          path: output.mp4
