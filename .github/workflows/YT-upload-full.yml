name: AUTO MERGE DRIVE DAN MEGA POST YOUTUBE

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Pisahkan koma, contoh: vid1,aud1,img1,aud2,vid3)'
        required: true
        type: textarea
      jobId:
        description: "ID Job dari Hugging Face"
        required: true
      videoTitle:
        description: "Judul Video"
        required: true
      videoDescription:
        description: "Deskripsi Video"
        required: true
      publishDate:
        description: "Tanggal Rilis YouTube (YYYY-MM-DD)"
        required: true
      videoTime:
        description: "Jam tayang (HH:MM)"
        required: true
      channelName:
        description: "Nama Target Channel"
        required: true
      thumbnailId:
        description: "ID Thumbnail Google Drive (Kosongkan jika Shorts)"
        required: false
        default: ""
      location:
        description: "Lokasi Video"
        required: false
      tags:
        description: "Tag Video"
        required: false
      aiContent:
        description: "AI Content Declaration"
        required: false
      audience:
        description: "Target Penonton"
        required: false
      ageRestriction:
        description: "Age Restriction"
        required: false

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      #Baru👇
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
            
      - name: Install Dependencies
        run: |
          npm install googleapis node-fetch
      #👆    
      - name: Debug Inputs
        run: |
         echo "channelName = '${{ github.event.inputs.channelName }}'"
         echo "publishDate = '${{ github.event.inputs.publishDate }}'"
         echo "videoTime = '${{ github.event.inputs.videoTime }}'"
         
      - name: Setup & Download
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg megatools gpac bc
          pip install -q gdown
          
          mkdir -p downloads ready
          
          URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          arr=($URLS)
          
          for (( i=0; i<${#arr[@]}; i++ )); do
            url=${arr[$i]}
            [ -z "$url" ] && continue
            
            output="downloads/raw_$i"
            if [[ "$url" == *"mega.nz"* ]]; then
              megadl "$url" --path "$output"
            else
              gdown "$url" -O "$output" --quiet
            fi
            
            ext=$(file --mime-type -b "$output" | cut -d/ -f2 | sed 's/jpeg/jpg/')
            mv "$output" "$output.$ext"
          done

      - name: Detect Video Mode
        run: |
          TOTAL=0

          for f in downloads/raw_*.*; do
          mime=$(file --mime-type -b "$f")

          if [[ "$mime" == audio/* ]] || [[ "$mime" == video/* ]]; then
            dur=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 "$f")

          TOTAL=$(echo "$TOTAL + $dur" | bc)
          fi
          done

           echo "TOTAL=$TOTAL"

          if (( $(echo "$TOTAL <= 60" | bc -l) )); then
           echo "WIDTH=720" >> $GITHUB_ENV
           echo "HEIGHT=1280" >> $GITHUB_ENV
           echo "VIDEO_TYPE=SHORT" >> $GITHUB_ENV
          else
           echo "WIDTH=1280" >> $GITHUB_ENV
           echo "HEIGHT=720" >> $GITHUB_ENV
           echo "VIDEO_TYPE=LONG" >> $GITHUB_ENV
          fi
     
      - name: Sync & Encode (Super Ringan & Hemat CPU)
        run: |
          WIDTH=${WIDTH}
          HEIGHT=${HEIGHT}

          echo "Mode : $VIDEO_TYPE"
          echo "Ukuran : ${WIDTH}x${HEIGHT}"
          files=($(ls downloads/raw_*.* | sort -V))
          num_files=${#files[@]}
          i=0

          FF_LIGHT="-c:v libx264 -preset ultrafast -tune fastdecode -crf 26 -pix_fmt yuv420p -c:a aac -g 30 -r 30"

          while [ $i -lt $num_files ]; do
            f="${files[$i]}"
            next_idx=$((i+1))
            next_f=""
            [ $next_idx -lt $num_files ] && next_f="${files[$next_idx]}"
            
            is_img=0; is_vid=0; is_aud=0; is_next_aud=0
            mime=$(file --mime-type -b "$f")
            [[ "$mime" == image/* ]] && is_img=1
            [[ "$mime" == video/* ]] && is_vid=1
            [[ "$mime" == audio/* ]] && is_aud=1

            if [ -n "$next_f" ]; then
              next_mime=$(file --mime-type -b "$next_f")
              [[ "$next_mime" == audio/* ]] && is_next_aud=1
            fi

            # KASUS A: GAMBAR + AUDIO (Dengan Efek Gerak Acak)
            if [ $is_img -eq 1 ] && [ $is_next_aud -eq 1 ]; then
              # Pilih arah gerak acak
              dir=$((RANDOM % 4))
              if [ $dir -eq 0 ]; then
                VF="scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=increase,pad=1600:900:(ow-iw)/2:(oh-ih)/2,crop=${WIDTH}:${HEIGHT}:x='(in_w-out_w)*t/10':y='(in_h-out_h)/2'"
              elif [ $dir -eq 1 ]; then
                VF="scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=increase,pad=1600:900:(ow-iw)/2:(oh-ih)/2,crop=${WIDTH}:${HEIGHT}:x='(in_w-out_w)*t/10':y='(in_h-out_h)/2'"
              elif [ $dir -eq 2 ]; then
                VF="scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=increase,pad=1600:900:(ow-iw)/2:(oh-ih)/2,crop=${WIDTH}:${HEIGHT}:x='(in_w-out_w)*t/10':y='(in_h-out_h)/2'"
              else
                VF="scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=increase,pad=1600:900:(ow-iw)/2:(oh-ih)/2,crop=${WIDTH}:${HEIGHT}:x='(in_w-out_w)*t/10':y='(in_h-out_h)/2'"
              fi

              ffmpeg -y -loop 1 -i "$f" -i "$next_f" \
              -vf "$VF,fps=30" \
              $FF_LIGHT -shortest "ready/video_$i.mp4"
              i=$((i+2))

            # KASUS B: VIDEO + AUDIO
            elif [ $is_vid -eq 1 ] && [ $is_next_aud -eq 1 ]; then
              ffmpeg -y -i "$f" -i "$next_f" \
              -filter_complex "[0:v]scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=decrease,pad=ceil(iw/2)*2:ceil(ih/2)*2:(ow-iw)/2:(oh-ih)/2[v]" \
              -map "[v]" -map 1:a:0 \
              $FF_LIGHT -shortest "ready/video_$i.mp4"
              i=$((i+2))

            # KASUS C: AUDIO SAJA
            elif [ $is_aud -eq 1 ]; then
              ffmpeg -y -f lavfi -i color=c=black:s=${WIDTH}x${HEIGHT}:d=5 -i "$f" \
              $FF_LIGHT -shortest "ready/video_$i.mp4"
              i=$((i+1))

            # KASUS D: VIDEO SAJA
            else
              ffmpeg -y -i "$f" \
              -filter_complex "[0:v]scale=${WIDTH}:${HEIGHT}:force_original_aspect_ratio=decrease,pad=ceil(iw/2)*2:ceil(ih/2)*2:(ow-iw)/2:(oh-ih)/2[v]" \
              -map "[v]" -map 0:a? \
              $FF_LIGHT -ar 44100 "ready/video_$i.mp4"
              i=$((i+1))
            fi
          done

      - name: Merge Final (Pakai MP4Box Instan)
        run: |
          files=($(ls ready/video_*.mp4 | sort -V))
          cmd="MP4Box"
          for f in "${files[@]}"; do
            cmd="$cmd -cat \"$f\""
          done
          cmd="$cmd -new output.mp4"
          eval $cmd
          mv output.mp4 video.mp4

    #  - name: Upload Artifact
      #  uses: actions/upload-artifact@v4
        #with:
        #  name: final-video
        #  path: output.mp4

      - name: Send Video to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        run: |
          echo "Memulai pengiriman video ke Telegram..."
          
          # Perbaikan struktur pemanggilan URL API Telegram menggunakan variabel env yang aman
          curl -v -F "video=@video.mp4" \
            -F "chat_id=$TELEGRAM_CHAT_ID" \
            -F "caption=🚀 Video Baru Selesai Dirender!%0A%0A📌 *Judul:* $VIDEO_TITLE" \
            -F "parse_mode=Markdown" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendVideo"

      - name: Upload to YouTube
        env:
          # 🌟 TRIK DINAMIS: Menyusun nama rahasia secara otomatis berdasarkan input channelName
          # Jika input berisi "Channel1", GitHub akan membaca secrets.YOUTUBE_CLIENT_ID_f044_Channel1
          # CLIENT_ID: ${{ secrets[format('YOUTUBE_CLIENT_ID_f044_{0}', github.event.inputs.channelName)] }}
          # CLIENT_SECRET: ${{ secrets[format('YOUTUBE_CLIENT_SECRET_f044_{0}', github.event.inputs.channelName)] }}
          # REFRESH_TOKEN: ${{ secrets[format('YOUTUBE_REFRESH_TOKEN_f044_{0}', github.event.inputs.channelName)] }}
          
           VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
           VIDEO_DESCRIPTION: ${{ github.event.inputs.videoDescription }}
           PUBLISH_DATE: ${{ github.event.inputs.publishDate }}
           VIDEO_TIME: ${{ github.event.inputs.videoTime }}
           THUMBNAIL_ID: ${{ github.event.inputs.thumbnailId }}
           LOCATION: ${{ github.event.inputs.location || '' }}
           TAGS: ${{ github.event.inputs.tags || '' }}
           AI_CONTENT: ${{ github.event.inputs.aiContent || '' }}
           AUDIENCE: ${{ github.event.inputs.audience || '' }}
           AGE_RESTRICTION: ${{ github.event.inputs.ageRestriction || '' }}
          
        run: |
          node upload.js
