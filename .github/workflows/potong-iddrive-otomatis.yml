name: AUTO POTONG ID DRIVE TO MERGE
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL Google Drive (pisahkan dengan spasi atau koma)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          # 1. Update sistem dan install FFmpeg
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir downloads
          
          # 2. Bersihkan input: ubah koma menjadi spasi agar bisa dibaca loop
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          # 3. Download setiap link
          count=1
          for url in $CLEAN_URLS; do
            echo "Mengunduh file ke-$count..."
            # gdown versi terbaru mendukung URL langsung
            gdown "$url" -O "downloads/video_$count.mp4"
            count=$((count + 1))
          done
          
          # 4. Buat list untuk FFmpeg (concat file)
          for f in downloads/*.mp4; do 
            echo "file '$f'" >> downloads/list.txt
          done

      - name: Merge Video
        run: |
          # 5. Gabungkan tanpa re-encode (-c copy) supaya sangat cepat
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
