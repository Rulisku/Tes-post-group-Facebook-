name: AUTO MERGE ADAPTIVE DRIVE FAN FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Drive/Filebin, pisahkan spasi)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads ready
          
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            echo "Memproses file ke-$count..."
            if [[ "$url" == *"drive.google.com"* ]]; then
              gdown "$url" -O "downloads/input_$count.mp4"
            else
              curl -L "$url" -o "downloads/input_$count.mp4"
            fi
            
            # PROSES ADAPTIF:
            # 1. Jika itu gambar (looping agar durasi mengikuti audio/video)
            # 2. Jika itu audio murni (dibuat jadi video hitam agar bisa digabung)
            # 3. Jika itu video (diambil audionya)
            
            ffmpeg -y -i "downloads/input_$count.mp4" \
            -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
            -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
            -c:a aac -shortest "ready/video_$count.mp4"
            
            count=$((count + 1))
          done
          
          for f in $(ls -v ready/video_*.mp4); do 
            echo "file '$(pwd)/$f'" >> list.txt
          done

      - name: Merge Video
        run: |
          # Sekarang semua file sudah memiliki durasi dan format yang sinkron
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
