name: AUTO MERGE PINTAR

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Pisahkan koma)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg megatools
          pip install gdown
          mkdir -p downloads ready

      - name: Sync & Encode
        run: |
          URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          arr=($URLS)
          
          for (( i=0; i<${#arr[@]}; i++ )); do
            url=${arr[$i]}
            # Download file ke-i
            if [ -n "$url" ]; then
              if [[ "$url" == *"mega.nz"* ]]; then
                megadl "$url" --path "downloads/raw_$i"
              else
                gdown "$url" -O "downloads/raw_$i"
              fi
            fi

            # Deteksi apakah file ini IMAGE
            is_image=$(file --mime-type "downloads/raw_$i" | grep -q "image/" && echo "yes" || echo "no")
            
            # Jika Image dan ada file berikutnya (Audio), gunakan logika Image+Audio
            if [ "$is_image" == "yes" ] && [ $((i+1)) -lt ${#arr[@]} ]; then
                ffmpeg -y -loop 1 -i "downloads/raw_$i" -i "downloads/raw_$((i+1))" \
                -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280: sz 1280:720" \
                -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest "ready/video_$i.mp4"
                
                # Lompat index karena audio sudah dipakai
                i=$((i+1))
            else
                # Jika Video atau file tunggal, proses standar (Tanpa -shortest)
                ffmpeg -y -i "downloads/raw_$i" \
                -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
                -c:v libx264 -pix_fmt yuv420p -c:a aac -ar 44100 "ready/video_$i.mp4"
            fi
          done

      - name: Merge Final
        run: |
          # Menggabungkan semua hasil dari folder 'ready'
          find ready -name "video_*.mp4" | sort | sed "s/^/file '&'/" > list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
