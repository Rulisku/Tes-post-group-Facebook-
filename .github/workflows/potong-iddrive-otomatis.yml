name: AUTO MERGE DRIVE & FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Drive atau Filebin, pisahkan dengan spasi/koma)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads
          
          # Bersihkan input (mengganti koma dengan spasi)
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            echo "Memproses link: $url"
            
            # Deteksi apakah URL dari Google Drive atau Filebin
            if [[ "$url" == *"drive.google.com"* ]]; then
              echo "Mengunduh via gdown (Google Drive)..."
              gdown "$url" -O "downloads/file_$count.mp4"
            else
              echo "Mengunduh via curl (Filebin/Direct Link)..."
              curl -L "$url" -o "downloads/file_$count.mp4"
            fi
            
            count=$((count + 1))
          done
          
          # Membuat list untuk FFmpeg (diurutkan berdasarkan nama)
          # Menggunakan $(pwd) untuk path absolut agar FFmpeg tidak error
          for f in $(ls -v downloads/file_*); do 
            echo "file '$(pwd)/$f'" >> downloads/list.txt
          done
          
          echo "Daftar file yang akan digabung:"
          cat downloads/list.txt

      - name: Merge Video
        run: |
          # Menggabungkan file tanpa re-encode
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-merged-video
          path: output.mp4
          
