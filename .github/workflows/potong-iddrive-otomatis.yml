name: AUTO MERGE DRIVE & FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Google Drive/Filebin/Lainnya) pisahkan dengan koma'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          # Install yt-dlp terbaru
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip install gdown
          mkdir -p downloads
          
          # Mengubah koma menjadi baris baru agar terbaca per item
          INPUT_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' '\n')
          
          count=1
          while IFS= read -r url || [ -n "$url" ]; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "Memproses link: $url"
            
            if [[ "$url" == *"drive.google.com"* ]]; then
               echo "Mengunduh via gdown (Google Drive)..."
               gdown "$url" -O "downloads/file_$count.mp4"
            elif [[ "$url" == *"filebin.net"* ]]; then
               echo "Mengunduh via yt-dlp/curl (Filebin)..."
               # Coba yt-dlp, jika gagal gunakan curl untuk mengambil file mentah
               yt-dlp --no-check-certificate --ignore-errors -o "downloads/file_$count.%(ext)s" "$url" || curl -L "$url" -o "downloads/file_$count.tmp"
               
               # Jika file .tmp ada (berarti curl berhasil), ubah ekstensinya agar bisa dibaca ffmpeg
               if [ -f "downloads/file_$count.tmp" ]; then
                 mv "downloads/file_$count.tmp" "downloads/file_$count.mp3"
               fi
            else
               echo "Mengunduh via yt-dlp (Lainnya)..."
               yt-dlp --no-check-certificate --ignore-errors -o "downloads/file_$count.%(ext)s" "$url"
            fi
            
            count=$((count + 1))
          done <<< "$INPUT_URLS"
          
          # Membuat list untuk FFmpeg agar bisa menggabungkan berbagai format
          for f in downloads/*; do 
            echo "file '$(pwd)/$f'" >> downloads/list.txt
          done
          
          echo "Daftar file yang akan digabung:"
          cat downloads/list.txt

      - name: Merge Video
        run: |
          echo "Menggabungkan file tanpa re-encode"
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
