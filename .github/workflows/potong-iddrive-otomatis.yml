name: AUTO MERGE DRIVE DAN FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (pisahkan spasi)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads ready
          
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            # 1. Download
            if [[ "$url" == *"drive.google.com"* ]]; then
              gdown "$url" -O "downloads/in_$count"
            else
              curl -L "$url" -o "downloads/in_$count"
            fi
            
            # 2. Proses Normalisasi (Wajib agar -c copy nanti berhasil)
            # Semua dikonversi ke H264/AAC agar saat di-merge tidak korup
            ffmpeg -y -i "downloads/in_$count" \
            -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
            -c:v libx264 -preset ultrafast -pix_fmt yuv420p \
            -c:a aac -shortest "ready/video_$count.mp4"
            
            count=$((count + 1))
          done
          
          # 3. Buat list
          for f in $(ls -v ready/video_*.mp4); do echo "file '$(pwd)/$f'" >> list.txt; done

      - name: Merge Video
        run: |
          # 4. Merge (Ini baru bisa pakai copy karena sudah diseragamkan di atas)
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
