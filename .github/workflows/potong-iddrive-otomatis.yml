name: AUTO MERGE PINTAR

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Pisahkan koma)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg megatools
          pip install gdown
          mkdir -p downloads ready

      - name: Sync & Encode
        run: |
          URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          arr=($URLS)
          
          for (( i=0; i<${#arr[@]}; i+=2 )); do
            # Download pasangan
            for j in 0 1; do
              idx=$((i+j))
              url=${arr[$idx]}
              if [ -n "$url" ]; then
                if [[ "$url" == *"mega.nz"* ]]; then
                  megadl "$url" --path "downloads/raw_$idx"
                else
                  gdown "$url" -O "downloads/raw_$idx"
                fi
              fi
            done

            # Proses jika ada pasangan
            if [ -f "downloads/raw_$((i+1))" ]; then
              # Jika File 1 adalah IMAGE (Pakai -shortest)
              if file --mime-type "downloads/raw_$i" | grep -q "image/"; then
                ffmpeg -y -loop 1 -i "downloads/raw_$i" -i "downloads/raw_$((i+1))" \
                -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
                -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest "ready/video_$i.mp4"
              
              # Jika File 1 adalah VIDEO (Tanpa -shortest agar durasi asli terjaga)
              else
                ffmpeg -y -i "downloads/raw_$i" -i "downloads/raw_$((i+1))" \
                -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
                -c:v libx264 -pix_fmt yuv420p -c:a aac -ar 44100 "ready/video_$i.mp4"
              fi
            else
              # Jika hanya 1 file (Video tunggal)
              ffmpeg -y -i "downloads/raw_$i" \
              -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
              -c:v libx264 -pix_fmt yuv420p -c:a aac "ready/video_$i.mp4"
            fi
          done

      - name: Merge Final
        run: |
          find ready -name "video_*.mp4" | sort | sed "s/^/file '&'/" > list.txt
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
