name: AUTO POTONG ID DRIVE TO MERGE

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Google Drive atau GoFile) pisahkan dengan spasi'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads
          
          # Bersihkan input
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ' | tr '\n' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            echo "Memproses file ke-$count: $url"
            
            if [[ "$url" == *"gofile.io"* ]]; then
              echo "Mendeteksi GoFile, mengambil via API..."
              FILE_ID=$(echo "$url" | awk -F'/d/' '{print $2}')
              
              # Mengambil data file via API GoFile
              # Kita ambil link download langsung dari struktur JSON
              DIRECT_URL=$(curl -s "https://api.gofile.io/getContent?contentId=$FILE_ID" | python3 -c "import sys, json; data=json.load(sys.stdin); print(list(data['data']['contents'].values())[0]['downloadPage'])")
              
              # Download file tersebut
              curl -L "$DIRECT_URL" -o "downloads/file_$count.mp4"
              
            elif [[ "$url" == *"drive.google.com"* ]]; then
              echo "Mendeteksi Google Drive..."
              gdown "$url" -O "downloads/file_$count.mp4"
              
            else
              echo "Link direct biasa..."
              curl -L "$url" -o "downloads/file_$count.mp4"
            fi
            
            count=$((count + 1))
          done
          
          ls -lh downloads/
          
          # Buat list untuk FFmpeg
          # Mengurutkan file agar urutan merge sesuai dengan urutan input
          for f in $(ls -v downloads/file_*); do 
            echo "file '$(pwd)/$f'" >> downloads/list.txt
          done

      - name: Merge Video
        run: |
          # Gabungkan file
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
