name: AUTO MERGE PINTAR DRIVE DAN MEGA IO

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Pisahkan koma, contoh: vid1,aud1,img1,aud2,vid3)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools & Download Fast
        run: |
          mkdir -p downloads ready
          
          # 1. Download biner FFmpeg & FFprobe resmi versi static (Super Cepat ~3 detik)
          # Menggunakan archive rilis resmi agar tidak bergantung pada server pihak ketiga yang tidak stabil
          wget -q https://github.com || \
          wget -q https://johnvansickle.com
          
          # Ekstrak biner dan pindahkan ke folder sistem lokal agar bisa langsung dipanggil perintah 'ffmpeg'
          if [ -f *.zip ]; then
            unzip -q *.zip && mv ffmpeg-*/bin/* /usr/local/bin/
          else
            tar -xf *.tar.xz && mv ffmpeg-*-static/ff* /usr/local/bin/
          </h2>fi
          rm -rf ffmpeg-* *.zip *.tar.xz
          
          # 2. Hanya menginstal gpac (MP4Box), megatools, dan bc secara paralel di background
          sudo apt-get install -y -qq --no-install-recommends gpac megatools bc > /dev/null 2>&1 &
          
          # 3. Install gdown instan tanpa dependencies tambahan
          pip install gdown --no-deps -q
          
          # 4. Proses Download Utama langsung berjalan bersamaan
          URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          arr=($URLS)
          
          for (( i=0; i<${#arr[@]}; i++ )); do
            url=${arr[$i]}
            [ -z "$url" ] && continue
            
            output="downloads/raw_$i"
            if [[ "$url" == *"mega.nz"* ]]; then
              # Pastikan instalasi megatools di background sudah selesai sebelum mendownload dari MEGA
              wait
              megadl "$url" --path "$output"
            else
              gdown "$url" -O "$output" --quiet
            fi
            
            ext=$(file --mime-type -b "$output" | cut -d/ -f2 | sed 's/jpeg/jpg/')
            mv "$output" "$output.$ext"
          done
          
          # Pastikan seluruh proses instalasi gpac di background selesai 100% sebelum masuk tahap encode
          wait

      - name: Sync & Encode (Super Ringan & Hemat CPU)
        run: |
          # 5. Proses penyamaan format dengan beban CPU seminimal mungkin
          files=($(ls downloads/raw_*.* | sort -V))
          num_files=${#files[@]}
          i=0

          # Konfigurasi flag FFmpeg untuk kecepatan maksimal, CPU santai, dan struktur frame yang sinkron
          FF_LIGHT="-c:v libx264 -preset ultrafast -tune fastdecode -crf 26 -pix_fmt yuv420p -c:a aac -g 30 -r 30"

          while [ $i -lt $num_files ]; do
            f="${files[$i]}"
            next_idx=$((i+1))
            next_f=""
            [ $next_idx -lt $num_files ] && next_f="${files[$next_idx]}"
            
            # Deteksi tipe file menggunakan flag
            is_img=0; is_vid=0; is_aud=0; is_next_aud=0
            mime=$(file --mime-type -b "$f")
            [[ "$mime" == image/* ]] && is_img=1
            [[ "$mime" == video/* ]] && is_vid=1
            [[ "$mime" == audio/* ]] && is_aud=1

            if [ -n "$next_f" ]; then
              next_mime=$(file --mime-type -b "$next_f")
              [[ "$next_mime" == audio/* ]] && is_next_aud=1
            fi

            # KASUS A: GAMBAR + AUDIO (Slide Foto)
            if [ $is_img -eq 1 ] && [ $is_next_aud -eq 1 ]; then
              ffmpeg -y -loop 1 -i "$f" -i "$next_f" \
              -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
              $FF_LIGHT -shortest "ready/video_$i.mp4"
              i=$((i+2))

            # KASUS B: VIDEO + AUDIO (Voice Over / Ganti Audio)
            elif [ $is_vid -eq 1 ] && [ $is_next_aud -eq 1 ]; then
              ffmpeg -y -i "$f" -i "$next_f" \
              -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
              $FF_LIGHT -map 0:v:0 -map 1:a:0 -shortest "ready/video_$i.mp4"
              i=$((i+2))

            # KASUS C: AUDIO SAJA (Buat layar hitam default 5 detik)
            elif [ $is_aud -eq 1 ]; then
              ffmpeg -y -f lavfi -i color=c=black:s=1280x720:d=5 -i "$f" \
              $FF_LIGHT -shortest "ready/video_$i.mp4"
              i=$((i+1))

            # KASUS D: VIDEO SAJA (Normalisasi resolusi & audio)
            else
              ffmpeg -y -i "$f" \
              -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
              $FF_LIGHT -ar 44100 "ready/video_$i.mp4"
              i=$((i+1))
            fi
          done

      - name: Merge Final (Pakai MP4Box Instan)
        run: |
          # 6. Menggabungkan semua klip MP4 secara instan tanpa membebani CPU
          files=($(ls ready/video_*.mp4 | sort -V))
          
          cmd="MP4Box"
          for f in "${files[@]}"; do
            cmd="$cmd -cat \"$f\""
          done
          cmd="$cmd -new output.mp4"
          
          eval $cmd

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
