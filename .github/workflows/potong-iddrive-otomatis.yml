name: AUTO MERGE ALL DRIVE DAN PIXELLBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Drive/Filebin, pisahkan spasi)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads ready
          
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            # Download file dengan nama asli
            FILENAME="input_$count"
            if [[ "$url" == *"drive.google.com"* ]]; then
              gdown "$url" -O "downloads/$FILENAME"
            else
              curl -L "$url" -o "downloads/$FILENAME"
            fi
            
            # Mendeteksi tipe file menggunakan ekstensi atau header
            # Kita gunakan ffmpeg untuk mendeteksi isi file secara akurat daripada hanya sekadar tebak-tebakan
            TYPE=$(ffprobe -v error -show_entries format=format_name -of default=noprint_wrappers=1:nokey=1 "downloads/$FILENAME" || echo "unknown")
            
            echo "Memproses file $count (Tipe terdeteksi: $TYPE)..."

            # Logika pemrosesan berdasarkan tipe konten
            # Jika ffprobe gagal/tidak dikenal, kita perlakukan sebagai gambar
            if [[ $TYPE == *"image"* ]] || [[ $TYPE == "unknown" ]]; then
              # Foto (jpg, png, jpeg, avif): Loop 5 detik
              ffmpeg -loop 1 -i "downloads/$FILENAME" -f lavfi -i anullsrc=r=44100:cl=stereo -c:v libx264 -t 5 -pix_fmt yuv420p -c:a aac -shortest "ready/video_$count.mp4"
            
            elif [[ $TYPE == *"mp3"* ]] || [[ $TYPE == *"wav"* ]] || [[ $TYPE == *"aac"* ]] || [[ $TYPE == *"m4a"* ]]; then
              # Audio (mp3, wav, aac, m4a): Buat video hitam 5 detik atau sesuai durasi audio
              ffmpeg -f lavfi -i color=c=black:s=1280x720:d=5 -i "downloads/$FILENAME" -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest "ready/video_$count.mp4"
            
            else
              # Video (mp4, mkv, dll): Normalisasi ke format yang sama
              ffmpeg -i "downloads/$FILENAME" -c:v libx264 -preset ultrafast -pix_fmt yuv420p -c:a aac -y "ready/video_$count.mp4"
            fi
            
            count=$((count + 1))
          done
          
          # Buat list untuk concat
          for f in $(ls -v ready/video_*.mp4); do 
            echo "file '$(pwd)/$f'" >> list.txt
          done

      - name: Merge Video
        run: |
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
