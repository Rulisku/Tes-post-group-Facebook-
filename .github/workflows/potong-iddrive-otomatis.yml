name: Auto Drive to Merge
on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL Google Drive (pisahkan dengan spasi)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir downloads
          
          # Fungsi AJAIB: Mengambil ID secara otomatis dari URL apa pun
          # Tidak peduli apakah itu link panjang atau pendek, dia akan potong sendiri
          extract_id() {
             # Mengambil string di antara '/d/' dan '/'
             echo "$1" | sed -E 's/.*\/d\/([a-zA-Z0-9_-]+).*/\1/'
          }
          
          # Loop otomatis membaca setiap URL yang di-paste
          for url in ${{ github.event.inputs.urls }}; do
            id=$(extract_id "$url")
            echo "Mengekstrak ID dari: $url -> Hasil: $id"
            gdown --id "$id" -O "downloads/$id.mp4"
          done
          
          # Membuat list FFmpeg otomatis
          for f in downloads/*.mp4; do echo "file '$f'" >> downloads/list.txt; done

      - name: Merge Video
        run: ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
