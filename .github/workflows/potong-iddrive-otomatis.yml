name: AUTO POTONG ID DRIVE TO MERGE

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL Google Drive (pisahkan dengan spasi atau koma)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install gdown
          mkdir -p downloads
          
          # Bersihkan input dan proses download
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            echo "Mengunduh file ke-$count..."
            gdown "$url" -O "downloads/video_$count.mp4"
            count=$((count + 1))
          done
          
          # Cek apakah file benar-benar ada
          ls -lh downloads/
          
          # Buat list untuk FFmpeg dengan path absolut
          # $(pwd) memastikan path mengarah ke lokasi file yang benar
          for f in downloads/*.mp4; do 
            echo "file '$(pwd)/$f'" >> downloads/list.txt
          done

      - name: Merge Video
        run: |
          # 5. Gabungkan tanpa re-encode (-c copy)
          # -safe 0 diperlukan jika path mengandung karakter khusus
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
