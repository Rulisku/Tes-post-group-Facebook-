name: AUTO MERGE DRIVE & FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Drive/Filebin) pisahkan dengan koma atau spasi'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip install gdown
          mkdir -p downloads ready
          
          # Bersihkan input dan proses download
          CLEAN_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          
          count=1
          for url in $CLEAN_URLS; do
            echo "Memproses file ke-$count..."
            # Cek jika Google Drive, gunakan gdown (metode potong ID Anda)
            if [[ "$url" == *"drive.google.com"* ]]; then
              gdown "$url" -O "downloads/temp_$count.mp4"
            else
              # Jika Filebin/Link lain, gunakan yt-dlp
              yt-dlp --no-check-certificate -o "downloads/temp_$count.%(ext)s" "$url"
            fi
            count=$((count + 1))
          done
          
          # NORMALISASI: Jadikan semua format (.mp3, .jpg, dll) menjadi .mp4 yang seragam
          for f in downloads/*; do
            echo "Menyamakan format: $f"
            # -preset ultrafast membuat proses ini sangat cepat
            ffmpeg -i "$f" -c:v libx264 -preset ultrafast -c:a aac -pix_fmt yuv420p -y "ready/$(basename "$f").mp4"
          done
          
          # Buat list dari file yang sudah seragam
          for f in ready/*.mp4; do 
            echo "file '$(pwd)/$f'" >> list.txt
          done

      - name: Merge Video
        run: |
          # Sekarang aman menggunakan -c copy
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
