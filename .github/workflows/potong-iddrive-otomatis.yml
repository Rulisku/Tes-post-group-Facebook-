name: AUTO MERGE DRIVE & FILEBIN

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (Google Drive/Filebin/Lainnya) pisahkan dengan koma'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Download
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          pip install gdown
          mkdir -p downloads
          
          # Mengubah koma menjadi baris baru dan memprosesnya
          INPUT_URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' '\n')
          
          while IFS= read -r url || [ -n "$url" ]; do
            url=$(echo "$url" | xargs)
            [ -z "$url" ] && continue
            
            echo "Memproses link: $url"
            
            if [[ "$url" == *"drive.google.com"* ]]; then
               gdown "$url" -O "downloads/file_$RANDOM.mp4"
            else
               # Kutip ganda "$url" tetap menjaga karakter %20 agar tidak rusak
               yt-dlp -o "downloads/file_%(title)s.%(ext)s" "$url"
            fi
          done <<< "$INPUT_URLS"
          
          # Membuat list untuk FFmpeg (semua format audio/video)
          for f in downloads/*; do 
            echo "file '$(pwd)/$f'" >> downloads/list.txt
          done

      - name: Merge Video
        run: |
          ffmpeg -f concat -safe 0 -i downloads/list.txt -c copy output.mp4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
