name: AUTO SYNC VIDEO AUDIO DRIVE DAN MEGA IO

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Masukkan URL (contoh: foto1,audio1,video2,audio2)'
        required: true
        type: textarea

jobs:
  proses:
    runs-on: ubuntu-latest
    steps:
      - name: Setup
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg megatools
          pip install gdown
          mkdir -p downloads ready

      - name: Download & Sync
        run: |
          URLS=$(echo "${{ github.event.inputs.urls }}" | tr ',' ' ')
          i=1
          j=1
          set -- $URLS
          
          # Proses berpasangan (input 1 & 2, input 3 & 4)
          while [ -n "$1" ]; do
            # Download file
            for url in "$1" "$2"; do
              if [ -n "$url" ]; then
                if [[ "$url" == *"mega.nz"* ]]; then
                  megadl "$url" --path "downloads/raw_$i"
                else
                  gdown "$url" -O "downloads/raw_$i"
                fi
                i=$((i+1))
              fi
            done

            # LOGIKA SYNC:
            # Jika ada dua file (pasangan), gabungkan dengan durasi mengikuti audio
            if [ -f "downloads/raw_$((i-1))" ] && [ -f "downloads/raw_$((i-2))" ]; then
              # Gunakan file kedua (audio) sebagai acuan durasi
              ffmpeg -y -stream_loop -1 -i "downloads/raw_$((i-2))" -i "downloads/raw_$((i-1))" \
              -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
              -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest "ready/video_$j.mp4"
            else
              # Jika hanya 1 file (video tanpa audio), langsung normalisasi
              ffmpeg -y -i "downloads/raw_$((i-1))" \
              -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720" \
              -c:v libx264 -pix_fmt yuv420p -c:a aac "ready/video_$j.mp4"
            fi
            
            j=$((j+1))
            shift 2
          done

      - name: Merge Final
        run: |
          for f in $(ls -v ready/video_*.mp4); do echo "file '$(pwd)/$f'" >> list.txt; done
          ffmpeg -f concat -safe 0 -i list.txt -c copy output.mp4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4
          
