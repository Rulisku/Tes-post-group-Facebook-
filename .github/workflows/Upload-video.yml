name: Download from HF and Upload to YouTube

on:
  workflow_dispatch:
    inputs:
      jobId:
        description: "ID Job dari Hugging Face"
        required: true

      videoTitle:
        description: "Judul Video"
        required: true

      videoDescription:
        description: "Deskripsi Video"
        required: true

      # 🌟 TAMBAHAN 1: Daftarkan pintu masuk untuk tanggal rilis dari n8n
      publishDate:
        description: "Tanggal dan Jam Rilis YouTube"
        required: true

      videoTime:
        description: "Jam tayang"
        required: true

      location:
        required: false

      tags:
        required: false

      aiContent:
        required: false

      audience:
        required: false

      ageRestriction:
        required: false

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install googleapis

      - name: Download Video from Hugging Face
        run: |
          echo "Download Job: ${{ github.event.inputs.jobId }}"

          curl -L \
            -o video.mp4 \
            "https://ferdyankuya-ytshortsku-long.hf.space/api/download-result/${{ github.event.inputs.jobId }}"

          if [ ! -s video.mp4 ]; then
            echo "Video kosong atau gagal didownload"
            exit 1
          fi

          echo "Ukuran file:"
          du -sh video.mp4

      #- name: Upload to YouTube
      #  env:
         # CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID_f044_ch1 }}
         # CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET_f044_ch1 }}
          #REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN_f044_ch1 }}
        #  VIDEO_TITLE: ${{ github.event.inputs.videoTitle }}
        #  VIDEO_DESCRIPTION: ${{ github.event.inputs.videoDescription }}
         # PUBLISH_DATE: ${{ github.event.inputs.publishDate }}
          #VIDEO_TIME: ${{ github.event.inputs.videoTime }}

        #
        #  LOCATION: ${{ github.event.inputs.location || '' }}
       #   TAGS: ${{ github.event.inputs.tags || '' }}
         # AI_CONTENT: ${{ github.event.inputs.aiContent || '' }}
         # AUDIENCE: ${{ github.event.inputs.audience || '' }}
         # AGE_RESTRICTION: ${{ github.event.inputs.ageRestriction || '' }}
          
        run: |
          node upload.js
