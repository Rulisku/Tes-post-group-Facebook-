<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT DASHBOARD PRO - RENDER ENGINE</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(180deg, #1a102b, #120a1f, #0b0715); color: #fff; min-height: 100vh; margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 30px; border-radius: 16px; width: 100%; max-width: 650px; }
        h1 { color: #a855f7; margin-bottom: 20px; font-size: 28px; text-shadow: 0 0 10px rgba(168,85,247,0.5); }
        .form-group { margin-bottom: 20px; text-align: left; }
        input[type="file"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4c1d95; background: rgba(15, 23, 42, 0.6); color: #fff; }
        .btn-generate { background: #a855f7; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .status-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: rgba(0,0,0,0.4); border-left: 4px solid #a855f7; display: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOT DASHBOARD PRO 🚀</h1>
        <div class="form-group"><input type="file" id="visualFile" accept="video/*,image/*"></div>
        <div class="form-group"><input type="file" id="audioFile" accept="audio/*"></div>
        <button class="btn-generate" onclick="startUpload()">🚀 UPLOAD KE GOFILE</button>
        <div id="statusBox" class="status-box"></div>
    </div>

    <script>
    async function startUpload() {
        const statusBox = document.getElementById('statusBox');
        const vFile = document.getElementById('visualFile').files[0];
        const aFile = document.getElementById('audioFile').files[0];

        if (!vFile || !aFile) { alert("Pilih file dulu!"); return; }

        statusBox.style.display = "block";
        statusBox.innerHTML = "⏳ Mengupload ke GoFile...";

        const upload = async (f) => {
            const fd = new FormData(); fd.append("file", f);
            const r = await fetch("https://store1.gofile.io/uploadFile", {method:"POST", body:fd});
            const j = await r.json(); return j.data.downloadPage;
        };

        const vUrl = await upload(vFile);
        const aUrl = await upload(aFile);

        statusBox.innerHTML = `
            <strong>✅ Upload Berhasil!</strong><br><br>
            Copy link ini untuk di-paste di GitHub Actions:<br><br>
            <strong>Visual:</strong> ${vUrl}<br>
            <strong>Audio:</strong> ${aUrl}<br><br>
            <p style="color:#10b981">Sekarang buka tab <strong>Actions</strong> di GitHub, pilih <strong>Render Video Engine</strong>, klik <strong>Run workflow</strong>, dan paste link di atas.</p>
        `;
    }
    </script>
</body>
</html>
