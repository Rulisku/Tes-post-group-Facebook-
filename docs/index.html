<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Uploader Litterbox Manual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 20px; border-radius: 12px; }
        .upload-row { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #3b82f6; }
        .btn-add { background: #3b82f6; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        label { font-size: 12px; color: #cbd5e1; }
        form { margin-bottom: 10px; border-bottom: 1px solid #475569; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h3>UPLOAD LITTERBOX MANUAL</h3>
    <button class="btn-add" onclick="addRow()">+ TAMBAH BARIS</button>
    <div id="container"></div>
</div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'upload-row';
        div.innerHTML = `
            <!-- Form Visual -->
            <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank">
                <input type="hidden" name="reqtype" value="fileupload">
                <input type="hidden" name="time" value="72h">
                <label>Visual (Video/Foto):</label><br>
                <input type="file" name="fileToUpload" required>
                <button type="submit">UPLOAD VISUAL</button>
            </form>

            <!-- Form Audio -->
            <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank">
                <input type="hidden" name="reqtype" value="fileupload">
                <input type="hidden" name="time" value="72h">
                <label>Audio:</label><br>
                <input type="file" name="fileToUpload" required>
                <button type="submit">UPLOAD AUDIO</button>
            </form>
            <button class="btn-del" onclick="this.parentElement.remove()">HAPUS BARIS</button>
        `;
        document.getElementById('container').appendChild(div);
    }
    
    // Tambah 1 baris saat pertama buka
    addRow();
</script>

</body>
</html>
