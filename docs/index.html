<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Stabil</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .row { background: #334155; padding: 10px; margin-bottom: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <button onclick="addRow()">+ TAMBAH FILE</button>
    <div id="container"></div>

    <script>
        function addRow() {
            const div = document.createElement('div');
            div.className = 'row';
            div.innerHTML = `<input type="file" class="fileInput"> <button onclick="upload(this)">UPLOAD</button><div class="res">Menunggu...</div>`;
            document.getElementById('container').appendChild(div);
        }

        function upload(btn) {
            const file = btn.previousElementSibling.files[0];
            const resDiv = btn.nextElementSibling;
            if (!file) return;

            btn.disabled = true;
            btn.innerText = "Mengunggah...";

            const fd = new FormData();
            fd.append("reqtype", "fileupload");
            fd.append("time", "12h");
            fd.append("fileToUpload", file);

            const xhr = new XMLHttpRequest();
            xhr.open("POST", "https://litterbox.catbox.moe/resources/internals/api.php", true);
            
            // TAMBAHAN: Paksa koneksi ditutup setelah selesai
            xhr.setRequestHeader("Connection", "close");

            xhr.onload = () => {
                if (xhr.status === 200) {
                    resDiv.innerHTML = `<a href="${xhr.responseText}" target="_blank">${xhr.responseText}</a>`;
                    btn.innerText = "Selesai";
                } else {
                    resDiv.innerText = "Gagal (Status " + xhr.status + ")";
                    btn.disabled = false;
                    btn.innerText = "UPLOAD";
                }
            };
            
            xhr.onerror = () => {
                resDiv.innerText = "Error Jaringan";
                btn.disabled = false;
                btn.innerText = "UPLOAD";
            };

            xhr.send(fd);
        }
        addRow();
    </script>
</body>
</html>
