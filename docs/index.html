<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload (Fast Hybrid)</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .row { background: #334155; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>

<h3>UPLOAD LITTERBOX (HYBRID MODE)</h3>
<button onclick="addRow()">+ TAMBAH BARIS</button>
<div id="container"></div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        const resId = 'res_' + Date.now();
        div.innerHTML = `
            <input type="file" required>
            <button onclick="uploadHybrid(this, '${resId}')">UPLOAD</button>
            <div id="${resId}" style="margin-top:10px;"></div>
        `;
        document.getElementById('container').appendChild(div);
    }

    function uploadHybrid(btn, resId) {
        const fileInput = btn.previousElementSibling;
        if (!fileInput.files[0]) return;

        btn.innerText = "Mengunggah...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("time", "12h");
        formData.append("fileToUpload", fileInput.files[0]);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "https://litterbox.catbox.moe/resources/internals/api.php", true);
        
        // PENTING: Jangan set Content-Type header manual! 
        // Biarkan browser yang men-generate-nya secara otomatis 
        // agar boundary file benar-benar sesuai dengan standar form.

        xhr.onload = function() {
            if (xhr.status === 200) {
                const link = xhr.responseText.trim();
                document.getElementById(resId).innerHTML = `Link: <a href="${link}" target="_blank">${link}</a>`;
                btn.innerText = "Selesai";
            } else {
                btn.innerText = "Gagal (Status " + xhr.status + ")";
                btn.disabled = false;
            }
        };

        xhr.send(formData);
    }

    addRow();
</script>
</body>
</html>
