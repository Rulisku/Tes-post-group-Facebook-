<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT DASHBOARD - RENDER ENGINE</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; display: flex; justify-content: center; padding: 50px; }
        .container { background: #1e293b; padding: 30px; border-radius: 12px; width: 100%; max-width: 500px; text-align: center; }
        input { margin: 10px 0; width: 100%; padding: 10px; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; padding: 12px; width: 100%; border: none; border-radius: 5px; cursor: pointer; }
        .status { margin-top: 20px; word-break: break-all; font-size: 14px; text-align: left; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UPLOAD KE TEMP.SH</h1>
        <input type="file" id="visualFile">
        <input type="file" id="audioFile">
        <button onclick="startUpload()">🚀 UPLOAD</button>
        <div id="statusBox" class="status"></div>
    </div>

    <script>
    async function startUpload() {
        const statusBox = document.getElementById('statusBox');
        const vFile = document.getElementById('visualFile').files[0];
        const aFile = document.getElementById('audioFile').files[0];
        
        if (!vFile || !aFile) { alert("Pilih file dulu!"); return; }
        statusBox.innerHTML = "⏳ Mengupload...";

        const upload = async (f) => {
            const fd = new FormData();
            fd.append("file", f);
            const r = await fetch("https://temp.sh/upload", { method: "POST", body: fd });
            const text = await r.text();
            // temp.sh mengembalikan URL langsung di dalam text respon
            return text.trim(); 
        };

        try {
            const vUrl = await upload(vFile);
            const aUrl = await upload(aFile);
            statusBox.innerHTML = `<strong>✅ Berhasil!</strong><br><br>Visual: ${vUrl}<br><br>Audio: ${aUrl}`;
        } catch (err) {
            statusBox.innerHTML = "❌ Error: " + err.message;
        }
    }
    </script>
</body>
</html>
