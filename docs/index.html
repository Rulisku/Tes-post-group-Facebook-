<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Merge Video (Optimized)</title>
  <style>
    /* Styling tetap sama agar tampilannya konsisten */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px; }
    .card { background:#1a1a24; border:1px solid #2a2a3a; border-radius:16px; padding:28px; width:100%; max-width:540px; }
    #btn-merge { width:100%; padding:13px; background:linear-gradient(90deg,#7c3aed,#3b82f6); color:white; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
    #btn-merge:disabled { opacity: 0.5; }
    .info { margin-top: 20px; font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>

<div class="card">
  <h1>⚡ Auto Merge Video</h1>
  <input type="file" id="file-input" multiple accept="video/*">
  <button id="btn-merge">🎬 Merge Sekarang</button>
  <div id="status"></div>
  <a id="btn-download" style="display:none;">⬇️ Download Hasil</a>
</div>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<script>
  const { createFFmpeg } = FFmpeg;
  const ffmpeg = createFFmpeg({ log: false });

  document.getElementById('btn-merge').addEventListener('click', async () => {
    const files = document.getElementById('file-input').files;
    const btn = document.getElementById('btn-merge');
    const status = document.getElementById('status');
    btn.disabled = true;

    try {
      if (!ffmpeg.isLoaded()) await ffmpeg.load();

      let outputFiles = [];
      for (let i = 0; i < files.length; i++) {
        const file = files[i];
        const name = `input_${i}.mp4`;
        const out = `seg_${i}.mp4`;
        
        // 1. Tulis file ke memori
        ffmpeg.FS('writeFile', name, await fetchFile(file));
        
        // 2. Encode segmen
        status.textContent = `Memproses: ${file.name}`;
        await ffmpeg.run('-i', name, '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '28', '-y', out);
        
        // 3. Hapus file input dari RAM setelah diproses
        ffmpeg.FS('unlink', name);
        outputFiles.push(out);
      }

      // 4. Concat
      const listTxt = outputFiles.map(f => `file '${f}'`).join('\n');
      ffmpeg.FS('writeFile', 'list.txt', listTxt);
      await ffmpeg.run('-f', 'concat', '-safe', '0', '-i', 'list.txt', '-c', 'copy', '-y', 'final.mp4');

      // 5. Download
      const data = ffmpeg.FS('readFile', 'final.mp4');
      const blob = new Blob([data.buffer], { type: 'video/mp4' });
      const dl = document.getElementById('btn-download');
      dl.href = URL.createObjectURL(blob);
      dl.download = 'output.mp4';
      dl.style.display = 'block';
      status.textContent = 'Selesai!';

      // 6. Cleanup akhir
      ffmpeg.FS('unlink', 'list.txt');
      ffmpeg.FS('unlink', 'final.mp4');
      outputFiles.forEach(f => ffmpeg.FS('unlink', f));
      
    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
