<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Cepat (No Tab Baru)</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .row { background: #334155; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        iframe { display: none; } /* Sembunyikan iframe */
        .result { margin-top: 10px; padding: 5px; background: #0f172a; border-left: 3px solid #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
        input[type="file"] { color: #cbd5e1; }
    </style>
</head>
<body>

<h3>UPLOAD TANPA TAB BARU (Litterbox)</h3>
<button onclick="addRow()">+ TAMBAH BARIS</button>
<div id="container"></div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        const frameId = 'frame_' + Date.now();
        const resultId = 'res_' + Date.now();

        div.innerHTML = `
            <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="${frameId}">
                <input type="hidden" name="reqtype" value="fileupload">
                <input type="hidden" name="time" value="72h">
                <input type="file" name="fileToUpload" required>
                <button type="submit" onclick="this.innerText='UPLOADING...'">UPLOAD</button>
            </form>
            <iframe name="${frameId}" id="${frameId}" onload="showLink('${frameId}', '${resultId}')"></iframe>
            <div id="${resultId}" class="result">Menunggu upload...</div>
        `;
        document.getElementById('container').appendChild(div);
    }

    // Fungsi untuk menangkap isi iframe setelah upload selesai
    function showLink(frameId, resultId) {
        const iframe = document.getElementById(frameId);
        try {
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            const text = doc.body.innerText.trim();
            if (text && text.includes('http')) {
                document.getElementById(resultId).innerHTML = `Link: <a href="${text}" target="_blank">${text}</a>`;
            }
        } catch (e) {
            // Error handling jika akses diblokir karena cross-origin
        }
    }

    addRow();
</script>
</body>
</html>
