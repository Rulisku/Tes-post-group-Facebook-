<!DOCTYPE html>
<html>
<head>
    <title>UPLOAD GOFILE (FAST)</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        iframe { width: 100%; height: 100px; background: #000; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>UPLOAD KE GOFILE (CEPAT)</h3>
        
        <form action="https://store1.gofile.io/uploadFile" method="POST" enctype="multipart/form-data" target="frame1">
            <input type="file" name="file" required>
            <button type="submit">UPLOAD VISUAL</button>
        </form>
        <iframe name="frame1"></iframe>

        <br>
        <form action="https://store1.gofile.io/uploadFile" method="POST" enctype="multipart/form-data" target="frame2">
            <input type="file" name="file" required>
            <button type="submit">UPLOAD AUDIO</button>
        </form>
        <iframe name="frame2"></iframe>

        <p style="font-size: 12px; color: #ccc;">
            * Setelah upload selesai, link akan muncul di kotak hitam di atas.
        </p>
    </div>
</body>
</html>
