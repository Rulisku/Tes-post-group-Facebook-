<!DOCTYPE html>
<html>
<head>
    <title>UPLOAD LITTERBOX LENGKAP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 600px; margin: auto; }
        .upload-row { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #3b82f6; }
        button { cursor: pointer; border: none; padding: 10px 15px; border-radius: 4px; font-weight: bold; }
        .btn-create { background: #3b82f6; color: #fff; width: 100%; margin-bottom: 20px; }
        .btn-upload { background: #059669; color: #fff; margin-top: 5px; }
        .btn-delete { background: #ef4444; color: #fff; margin-top: 5px; }
        label { font-size: 14px; color: #cbd5e1; }
    </style>
</head>
<body>
    <div class="box">
        <h3>UPLOAD LITTERBOX (VISUAL + AUDIO)</h3>
        <button class="btn-create" onclick="addPair()">+ TAMBAH BARIS UPLOAD BARU</button>
        
        <div id="container">
            <!-- Baris Awal -->
            <div class="upload-row" id="row1">
                <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank" style="display:inline-block; width: 45%;">
                    <input type="hidden" name="reqtype" value="fileupload">
                    <input type="hidden" name="time" value="72h">
                    <label>Visual (Foto/Video):</label><br>
                    <input type="file" name="fileToUpload" accept="video/*,image/*" required>
                    <button type="submit" class="btn-upload">UPLOAD</button>
                </form>

                <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank" style="display:inline-block; width: 45%;">
                    <input type="hidden" name="reqtype" value="fileupload">
                    <input type="hidden" name="time" value="72h">
                    <label>Audio:</label><br>
                    <input type="file" name="fileToUpload" accept="audio/*" required>
                    <button type="submit" class="btn-upload">UPLOAD</button>
                </form>
                
                <button class="btn-delete" onclick="this.parentElement.remove()">HAPUS BARIS</button>
            </div>
        </div>
    </div>

    <script>
        function addPair() {
            const container = document.getElementById('container');
            const div = document.createElement('div');
            div.className = 'upload-row';
            div.innerHTML = `
                <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank" style="display:inline-block; width: 45%;">
                    <input type="hidden" name="reqtype" value="fileupload">
                    <input type="hidden" name="time" value="72h">
                    <label>Visual:</label><br>
                    <input type="file" name="fileToUpload" accept="video/*,image/*" required>
                    <button type="submit" class="btn-upload">UPLOAD</button>
                </form>
                <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="_blank" style="display:inline-block; width: 45%;">
                    <input type="hidden" name="reqtype" value="fileupload">
                    <input type="hidden" name="time" value="72h">
                    <label>Audio:</label><br>
                    <input type="file" name="fileToUpload" accept="audio/*" required>
                    <button type="submit" class="btn-upload">UPLOAD</button>
                </form>
                <button class="btn-delete" onclick="this.parentElement.remove()">HAPUS BARIS</button>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
