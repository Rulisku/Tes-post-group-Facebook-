<!DOCTYPE html>
<html>
<head>
    <title>UPLOAD LITTERBOX (FAST)</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        iframe { width: 100%; height: 60px; background: #000; margin-top: 10px; border: none; color: #0f0; }
        .divider { border-top: 1px solid #475569; margin: 25px 0; }
        h4 { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h3>UPLOAD KE LITTERBOX</h3>
        
        <!-- Bagian Visual (Foto/Video) -->
        <h4>Visual (Foto/Video)</h4>
        <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="frame1">
            <input type="hidden" name="reqtype" value="fileupload">
            <input type="hidden" name="time" value="72h">
            <input type="file" name="fileToUpload" accept="video/*,image/*" required>
            <button type="submit">UPLOAD VISUAL</button>
        </form>
        <iframe name="frame1"></iframe>

        <div class="divider"></div>

        <!-- Bagian Audio -->
        <h4>Audio</h4>
        <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="frame2">
            <input type="hidden" name="reqtype" value="fileupload">
            <input type="hidden" name="time" value="72h">
            <input type="file" name="fileToUpload" accept="audio/*" required>
            <button type="submit">UPLOAD AUDIO</button>
        </form>
        <iframe name="frame2"></iframe>

        <p style="font-size: 12px; color: #94a3b8; margin-top: 20px;">
            * Link akan muncul di kotak hitam masing-masing setelah upload selesai.
        </p>
    </div>
</body>
</html>
