<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Litterbox Direct Upload</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .row { background: #334155; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .result { margin-top: 10px; padding: 10px; background: #0f172a; border-left: 4px solid #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:disabled { background: #64748b; }
        input[type="file"] { color: #cbd5e1; }
    </style>
</head>
<body>

<h3>LITTERBOX DIRECT UPLOAD</h3>
<button onclick="addRow()">+ TAMBAH BARIS</button>
<div id="container"></div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        const resId = 'res_' + Date.now();

        div.innerHTML = `
            <input type="file" required>
            <button onclick="uploadLitterbox(this, '${resId}')">UPLOAD</button>
            <div id="${resId}" class="result">Menunggu file...</div>
        `;
        document.getElementById('container').appendChild(div);
    }

    function uploadLitterbox(btn, resId) {
        const fileInput = btn.previousElementSibling;
        if (!fileInput.files[0]) return alert("Pilih file dulu!");

        btn.innerText = "Mengunggah...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("reqtype", "fileupload");
        formData.append("time", "72h"); // Bisa diubah: 1h, 12h, 24h, 72h
        formData.append("fileToUpload", fileInput.files[0]);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "https://litterbox.catbox.moe/resources/internals/api.php", true);

        xhr.onload = function() {
            if (xhr.status === 200) {
                const link = xhr.responseText.trim();
                document.getElementById(resId).innerHTML = `Link: <a href="${link}" target="_blank">${link}</a>`;
                btn.innerText = "Selesai";
            } else {
                btn.innerText = "Gagal (Error " + xhr.status + ")";
                btn.disabled = false;
            }
        };

        xhr.onerror = function() {
            btn.innerText = "Gagal (Network Error)";
            btn.disabled = false;
        };

        xhr.send(formData);
    }

    // Tambah satu baris saat halaman dimuat
    addRow();
</script>
</body>
</html>
