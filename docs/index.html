<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload Cepat (No Tab Baru)</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        .row { background: #334155; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        iframe { display: block; width: 100%; height: 50px; border: none; margin-top: 10px; background: #1e293b; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h3>UPLOAD TANPA TAB BARU</h3>
<button onclick="addRow()">+ TAMBAH BARIS</button>
<div id="container"></div>

<script>
    function addRow() {
        const div = document.createElement('div');
        div.className = 'row';
        const frameId = 'frame_' + Date.now();
        div.innerHTML = `
            <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="${frameId}">
                <input type="hidden" name="reqtype" value="fileupload">
                <input type="hidden" name="time" value="72h">
                <input type="file" name="fileToUpload" required>
                <button type="submit">UPLOAD</button>
            </form>
            <!-- Iframe ini yang menampung proses upload agar tidak pindah halaman -->
            <iframe name="${frameId}" src="about:blank"></iframe>
        `;
        document.getElementById('container').appendChild(div);
    }
    addRow();
</script>
</body>
</html>
