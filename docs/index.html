<!DOCTYPE html>
<html>
<body>
    <input type="file" id="visualFile">
    <input type="file" id="audioFile">
    <button onclick="startProcess()">🚀 RENDER</button>

    <script>
    async function startProcess() {
        // 1. Upload ke GoFile
        const formData = new FormData();
        formData.append("file", document.getElementById('visualFile').files[0]);
        
        const upload = await fetch("https://store1.gofile.io/uploadFile", { method: "POST", body: formData });
        const result = await upload.json();
        const fileUrl = result.data.downloadPage;

        // 2. Trigger GitHub Action
        await fetch("https://api.github.com/repos/USERNAME/REPO_NAME/dispatches", {
            method: "POST",
            headers: {
                "Authorization": "token GITHUB_PAT_ANDA",
                "Accept": "application/vnd.github.v3+json"
            },
            body: JSON.stringify({
                event_type: "render-video",
                client_payload: { video_url: fileUrl }
            })
        });
        alert("Render dimulai! Cek tab Actions di GitHub.");
    }
    </script>
</body>
</html>
