<!DOCTYPE html>
<html>
<head>
    <title>UPLOAD LITTERBOX (FAST)</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        .box { background: #1e293b; padding: 20px; border-radius: 12px; max-width: 500px; margin: auto; }
        iframe { width: 100%; height: 60px; background: #000; margin-top: 10px; border: none; color: #0f0; }
    </style>
</head>
<body>
    <div class="box">
        <h3>UPLOAD KE LITTERBOX (DIRECT)</h3>
        
        <form action="https://litterbox.catbox.moe/resources/internals/api.php" method="POST" enctype="multipart/form-data" target="frame1">
            <input type="hidden" name="reqtype" value="fileupload">
            <input type="hidden" name="time" value="72h"> <!-- File bertahan 72 jam -->
            <input type="file" name="fileToUpload" required>
            <button type="submit">UPLOAD FILE</button>
        </form>
        <iframe name="frame1"></iframe>

        <p style="font-size: 12px; color: #ccc;">
            * Link akan muncul di kotak hitam di atas setelah proses upload selesai.
        </p>
    </div>
</body>
</html>
